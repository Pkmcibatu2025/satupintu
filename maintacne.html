
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Maintenance - UPT Puskesmas Cibatu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #4CAF50, #2E7D32);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 20px;
    }

    .emoji {
      font-size: 80px;
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    h1 {
      font-size: 28px;
      margin: 20px 0 10px;
    }

    p {
      font-size: 16px;
      opacity: 0.9;
    }

    .loading {
      margin-top: 20px;
    }

    .dot {
      height: 10px;
      width: 10px;
      margin: 0 5px;
      background-color: white;
      border-radius: 50%;
      display: inline-block;
      animation: blink 1.4s infinite both;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }

    .buttons {
      margin-top: 25px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-reload {
      background: white;
      color: #2E7D32;
    }

    .btn-reload:hover {
      background: #C8E6C9;
    }

    .btn-back {
      background: transparent;
      color: white;
      border: 2px solid white;
    }

    .btn-back:hover {
      background: rgba(255,255,255,0.2);
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      opacity: 0.7;
    }

  </style>
</head>
<body>

  <div class="container">
    
    <div class="emoji">👨‍⚕️💉</div>

    <h1>Satu Pintu Lagi Dirawat 🛠️</h1>

    <p>
      UPT Puskesmas Cibatu sedang melakukan perbaikan sistem<br>
      agar pelayanan makin cepat & nyaman 😊
    </p>

    <div class="loading">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div class="buttons">
      <button class="btn btn-reload" onclick="location.reload()">🔄 Coba Lagi</button>
      <button class="btn btn-back" onclick="goBack()">⬅️ Kembali</button>
    </div>

    <div class="footer">
      © 2026 UPT Puskesmas Cibatu
    </div>

  </div>

  <script>
    function goBack() {
      if (document.referrer !== "") {
        history.back();
      } else {
        // fallback kalau tidak ada halaman sebelumnya
        window.location.href = "/";
      }
    }
  </script>

</body>
</html>
