<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Maintenance - UPT Puskesmas Cibatu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #4CAF50, #1B5E20);
  color: white;
  height: 100vh;
  overflow: hidden;
  text-align: center;
}

/* container */
.container {
  position: relative;
  z-index: 2;
  top: 20%;
}

h1 { font-size: 28px; }
p { opacity: 0.9; }

/* 🛣️ ROAD */
.road {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 140px;
  background: #2b2b2b;
  overflow: hidden;
}

/* garis jalan */
.road::before {
  content: "";
  position: absolute;
  top: 65px;
  width: 400%;
  height: 6px;
  background: repeating-linear-gradient(
    to right,
    white 0px,
    white 40px,
    transparent 40px,
    transparent 80px
  );
  animation: roadMove 1s linear infinite;
}

@keyframes roadMove {
  from { transform: translateX(0); }
  to { transform: translateX(-80px); }
}

/* 🚑 ambulance */
.ambulance {
  position: absolute;
  bottom: 40px;
  font-size: 55px;
}

/* 🚨 siren */
.siren {
  position: absolute;
  top: -10px;
  left: 15px;
  display: flex;
  gap: 2px;
}

.light {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  animation: blink 0.4s infinite;
  box-shadow: 0 0 10px currentColor;
}

.red { background: red; color: red; }
.blue { background: #00bfff; color: #00bfff; animation-delay: 0.2s; }

@keyframes blink {
  0%,100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* 💡 glow dari ambulance */
.glow {
  position: absolute;
  bottom: 20px;
  left: 20px;
  width: 60px;
  height: 20px;
  background: rgba(255,255,255,0.2);
  filter: blur(10px);
}

/* loading */
.dot {
  height: 10px;
  width: 10px;
  margin: 0 5px;
  background-color: white;
  border-radius: 50%;
  display: inline-block;
  animation: dotblink 1.4s infinite both;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotblink {
  0%,80%,100% { opacity: 0; }
  40% { opacity: 1; }
}

/* tombol */
.buttons { margin-top: 20px; }

.btn {
  padding: 10px 20px;
  margin: 5px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.reload { background: white; color: #2E7D32; }
.back {
  background: transparent;
  border: 2px solid white;
  color: white;
}

/* countdown */
.countdown {
  margin-top: 15px;
  font-size: 18px;
  font-weight: bold;
}

.footer {
  margin-top: 25px;
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">
  <h1>🚧 Satu Pintu Sedang Dirawat</h1>
  <p>UPT Puskesmas Cibatu sedang meningkatkan layanan 😊</p>

  <div>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>

  <div class="countdown" id="countdown">
    ⏳ Estimasi selesai: --
  </div>

  <div class="buttons">
    <button class="btn reload" onclick="location.reload()">🔄 Coba Lagi</button>
    <button class="btn back" onclick="goBack()">⬅️ Kembali</button>
  </div>

  <div class="footer">© 2026 UPT Puskesmas Cibatu</div>
</div>

<!-- 🚑 ROAD -->
<div class="road">
  <div class="ambulance" id="ambulance">
    🚑
    <div class="siren">
      <div class="light red"></div>
      <div class="light blue"></div>
    </div>
    <div class="glow"></div>
  </div>
</div>

<script>
// tombol kembali
function goBack() {
  if (document.referrer !== "") {
    history.back();
  } else {
    window.location.href = "/";
  }
}

// countdown
const targetTime = new Date();
targetTime.setMinutes(targetTime.getMinutes() + 30);

function updateCountdown() {
  const now = new Date();
  const diff = targetTime - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML = "✅ Sudah selesai! Refresh ya";
    return;
  }

  const m = Math.floor(diff / 60000);
  const s = Math.floor((diff % 60000) / 1000);

  document.getElementById("countdown").innerHTML =
    `⏳ Estimasi selesai: ${m}m ${s}s`;
}

setInterval(updateCountdown, 1000);
updateCountdown();

/* 🚑 GERAK REALISTIS PP */
const amb = document.getElementById("ambulance");

function moveRight() {
  amb.style.transition = "left 6s linear";
  amb.style.transform = "scaleX(-1)";
  amb.style.left = "110%";
}

function moveLeft() {
  amb.style.transition = "left 6s linear";
  amb.style.transform = "scaleX(1)";
  amb.style.left = "-100px";
}

let dir = "right";

function loop() {
  if (dir === "right") {
    moveRight();
    dir = "left";
  } else {
    moveLeft();
    dir = "right";
  }
}

setInterval(loop, 6000);
moveRight();
</script>

</body>
</html>
