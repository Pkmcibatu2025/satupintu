<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penilaian Pegawai</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body { background:#f5f6fa; padding:20px; }
.employee-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
}
.employee-card {
  background:white;
  border-radius:12px;
  padding:15px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
}
.employee-card:hover {
  transform:translateY(-5px);
}
.employee-photo {
  width:100px;height:100px;border-radius:50%;object-fit:cover;
}
.employee-name { font-weight:bold; }
.employee-jabatan { font-size:13px;color:#666; }

.star { font-size:2rem;color:#ddd;cursor:pointer; }
.star.active { color:#ffc107; }
</style>
</head>

<body>

<div class="container">
  <h2 class="text-center mb-3">Penilaian Pegawai</h2>

  <!-- SEARCH -->
  <input id="searchInput" class="form-control mb-3" placeholder="Cari nama..." style="display:none">

  <!-- GRID -->
  <div id="employeeGrid" class="employee-grid"></div>
</div>

<!-- MODAL PILIH RUANGAN -->
<div class="modal fade" id="ruanganModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Pilih Ruangan</h5>
      </div>
      <div class="modal-body" id="ruanganList"></div>
    </div>
  </div>
</div>

<!-- MODAL REVIEW -->
<div class="modal fade" id="reviewModal">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <h5 id="modalName"></h5>
      <p id="modalJabatan"></p>
      <img id="modalPhoto" width="100">

      <div class="text-center">
        <i class="star fa fa-star" data-rating="1"></i>
        <i class="star fa fa-star" data-rating="2"></i>
        <i class="star fa fa-star" data-rating="3"></i>
        <i class="star fa fa-star" data-rating="4"></i>
        <i class="star fa fa-star" data-rating="5"></i>
      </div>

      <textarea id="reviewText" class="form-control mt-2"></textarea>
      <button id="submitReview" class="btn btn-primary mt-2">Kirim</button>
    </div>
  </div>
</div>

<script src="karyawan.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const grid = document.getElementById('employeeGrid');
const searchInput = document.getElementById('searchInput');
const ruanganList = document.getElementById('ruanganList');

let currentData = [];
let currentEmployee = null;

// 🔥 ambil ruangan unik
const ruanganUnik = [...new Set(karyawan.map(k=>k.ruangan).filter(r=>r))];

// 🔥 tampilkan modal ruangan
function showRuanganModal(){
  ruanganList.innerHTML='';
  ruanganUnik.forEach(r=>{
    const btn=document.createElement('button');
    btn.className='btn btn-primary w-100 mb-2';
    btn.innerText=r;
    btn.onclick=()=>{
      bootstrap.Modal.getInstance(document.getElementById('ruanganModal')).hide();
      loadKaryawan(r);
    };
    ruanganList.appendChild(btn);
  });

  new bootstrap.Modal(document.getElementById('ruanganModal')).show();
}

// 🔥 load karyawan by ruangan
function loadKaryawan(ruangan){
  searchInput.style.display='block';
  currentData = karyawan.filter(k=>k.ruangan===ruangan);
  render(currentData);
}

// 🔥 render
function render(data){
  grid.innerHTML='';
  data.forEach(emp=>{
    const div=document.createElement('div');
    div.className='employee-card';
    div.innerHTML=`
      <img src="${emp.photo}" class="employee-photo" onerror="this.src='karyawan/default.png'">
      <div class="employee-name">${emp.name}</div>
      <div class="employee-jabatan">${emp.jabatan}</div>
    `;
    div.onclick=()=>openModal(emp);
    grid.appendChild(div);
  });
}

// 🔍 search
searchInput.addEventListener('input',()=>{
  const val=searchInput.value.toLowerCase();
  render(currentData.filter(k=>k.name.toLowerCase().includes(val)));
});

// 🔥 modal review
function openModal(emp){
  currentEmployee=emp;
  document.getElementById('modalName').innerText=emp.name;
  document.getElementById('modalJabatan').innerText=emp.jabatan;
  document.getElementById('modalPhoto').src=emp.photo;
  new bootstrap.Modal(document.getElementById('reviewModal')).show();
}

// ⭐ rating
document.querySelectorAll('.star').forEach(star=>{
  star.onclick=()=>{
    let r=star.dataset.rating;
    document.querySelectorAll('.star').forEach((s,i)=>{
      s.classList.toggle('active', i<r);
    });
    document.getElementById('selectedRating').value=r;
  };
});

// 🚀 init
showRuanganModal();
</script>

</body>
</html>
