<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Maintenance - UPT Puskesmas Cibatu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #4CAF50, #2E7D32);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
  text-align: center;
}

.container {
  max-width: 500px;
  z-index: 2;
}

h1 {
  font-size: 28px;
}

p {
  opacity: 0.9;
}

/* 🚑 Ambulance animation */
.road {
  position: absolute;
  bottom: 60px;
  width: 100%;
  height: 100px;
  overflow: hidden;
}

.ambulance {
  position: absolute;
  font-size: 50px;
  animation: drive 8s linear infinite;
}

@keyframes drive {
  0% { left: -100px; }
  100% { left: 110%; }
}

/* loading dots */
.dot {
  height: 10px;
  width: 10px;
  margin: 0 5px;
  background-color: white;
  border-radius: 50%;
  display: inline-block;
  animation: blink 1.4s infinite both;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0; }
  40% { opacity: 1; }
}

/* buttons */
.buttons {
  margin-top: 20px;
}

.btn {
  padding: 10px 20px;
  margin: 5px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.reload {
  background: white;
  color: #2E7D32;
}

.back {
  background: transparent;
  border: 2px solid white;
  color: white;
}

/* countdown */
.countdown {
  margin-top: 15px;
  font-size: 18px;
  font-weight: bold;
}

.footer {
  margin-top: 25px;
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">
  <h1>🚧 Satu Pintu Sedang Dirawat</h1>

  <p>
    UPT Puskesmas Cibatu sedang meningkatkan layanan<br>
    agar lebih cepat & nyaman 😊
  </p>

  <div>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>

  <div class="countdown" id="countdown">
    ⏳ Estimasi selesai: --
  </div>

  <div class="buttons">
    <button class="btn reload" onclick="location.reload()">🔄 Coba Lagi</button>
    <button class="btn back" onclick="goBack()">⬅️ Kembali</button>
  </div>

  <div class="footer">
    © 2026 UPT Puskesmas Cibatu
  </div>
</div>

<!-- 🚑 Ambulance -->
<div class="road">
  <div class="ambulance">🚑</div>
</div>

<script>
// tombol kembali
function goBack() {
  if (document.referrer !== "") {
    history.back();
  } else {
    window.location.href = "/";
  }
}

// ⏳ Countdown (SET WAKTU DI SINI)
const targetTime = new Date();
targetTime.setMinutes(targetTime.getMinutes() + 230); // ubah durasi di sini

function updateCountdown() {
  const now = new Date();
  const diff = targetTime - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML = "✅ Sudah selesai! Silakan refresh";
    return;
  }

  const minutes = Math.floor(diff / 60000);
  const seconds = Math.floor((diff % 60000) / 1000);

  document.getElementById("countdown").innerHTML =
    `⏳ Estimasi selesai: ${minutes}m ${seconds}s`;
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
